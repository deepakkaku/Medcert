# medcert.doctrust.in - Nginx Configuration
# Future-ready Reverse Proxy setup (matches doctrust-home pattern)

# --- HTTP to HTTPS Redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name medcert.doctrust.in;

    return 301 https://medcert.doctrust.in$request_uri;
}

# --- PRIMARY SERVER BLOCK (HTTPS) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name medcert.doctrust.in;

    # SSL Certificates (Reusing existing doctrust.in wildcard cert)
    ssl_certificate /etc/letsencrypt/live/doctrust.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doctrust.in/privkey.pem;

    # --- SSL HARDENING (TLS 1.3 Focus) ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # --- SECURITY HEADERS ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=()" always;
    add_header X-XSS-Protection "0" always;

    # --- REVERSE PROXY TO EXPRESS (Port 5174) ---
    location / {
        proxy_pass http://localhost:5174;
        proxy_http_version 1.1;
        
        # Standard Proxy Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forwarding Client Info
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # --- GZIP COMPRESSION ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Error pages
    error_log  /var/log/nginx/medcert_error.log;
    access_log /var/log/nginx/medcert_access.log;
}
